<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Напоминания</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/app/static/style.css?v=6" />
</head>
<body>
  <div id="app" class="app">
    <div class="app__stack">
      <header class="hdr">
        <h1 class="title" id="screenTitle">Напоминания</h1>
        <p class="sub" id="tzLine"></p>
      </header>
      <div id="globalErr" class="globalErr" hidden></div>
      <main class="main" id="main">
        <div class="main__sheet" id="mainSheet"></div>
      </main>
    </div>
    <div class="app-rail" aria-label="Разделы">
      <nav class="tabs" id="tabs">
        <button type="button" class="tab" data-view="active">Активные</button>
        <button type="button" class="tab" data-view="today">Сегодня</button>
        <button type="button" class="tab" data-view="history">История</button>
        <button type="button" class="tab" data-view="new">Создать</button>
        <button type="button" class="tab" data-view="settings">Настройки</button>
      </nav>
    </div>
  </div>
  <script src="/app/static/app.js?v=6"></script>
</body>
</html>
