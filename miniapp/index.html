<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Напоминания</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#007F3E" />
  <link rel="icon" href="/app/static/icon.png?v=2" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/app/static/icon.png?v=2" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/app/static/style.css?v=18" />
</head>
<body>
  <div id="app" class="app">
    <div class="app__stack">
      <header class="hdr">
        <h1 class="title" id="screenTitle">Напоминания</h1>
        <p class="sub" id="tzLine"></p>
      </header>
      <div id="globalErr" class="globalErr" hidden></div>
      <main class="main" id="main">
        <div class="main__sheet" id="mainSheet"></div>
      </main>
    </div>
    <div class="app-rail">
      <div class="app-rail__inner" id="tabs">
        <nav class="nav-pill" aria-label="Разделы">
          <button type="button" class="tab tab--item" data-view="active">
            <span class="tab__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </span>
            <span class="tab__label">Активные</span>
          </button>
          <button type="button" class="tab tab--item" data-view="today">
            <span class="tab__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            </span>
            <span class="tab__label">Сегодня</span>
          </button>
          <button type="button" class="tab tab--item" data-view="history">
            <span class="tab__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
            </span>
            <span class="tab__label">История</span>
          </button>
          <button type="button" class="tab tab--item" data-view="friends">
            <span class="tab__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="3"/><path d="M20 8v6M17 11h6"/></svg>
            </span>
            <span class="tab__label">Друзья</span>
          </button>
          <button type="button" class="tab tab--item" data-view="settings">
            <span class="tab__icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </span>
            <span class="tab__label">Настройки</span>
          </button>
        </nav>
        <button type="button" class="tab tab--fab" data-view="new" aria-label="Создать">
          <span class="tab__fab-icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </span>
          <span class="tab__fab-label">Создать</span>
        </button>
      </div>
    </div>
  </div>
  <script src="/app/static/app.js?v=23"></script>
</body>
</html>
